<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 36" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Icon: speech bubble with a spark -->
  <rect x="1" y="1" width="28" height="22" rx="7" fill="url(#iconGrad)"/>
  <polygon points="7,23 14,29 14,23" fill="url(#iconGrad)"/>
  <!-- Lines inside bubble -->
  <rect x="6" y="8"  width="10" height="2.5" rx="1.2" fill="white" opacity="0.9"/>
  <rect x="6" y="13" width="16" height="2.5" rx="1.2" fill="white" opacity="0.6"/>

  <!-- Wordmark -->
  <text
    x="38" y="26"
    font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.5"
    fill="url(#textGrad)"
  >fluento</text>
</svg>
